<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能椅子</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #1c1c1e; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; color: #f2f2f7;
        }

        .mobile-frame {
            width: 375px; height: 812px;
            background-color: #000000;
            border-radius: 40px;
            border: 8px solid #2c2c2e;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden; display: flex; flex-direction: column;
            position: relative;
        }

        .header {
            padding: 35px 20px 10px; border-bottom: 1px solid #38383a;
            display: flex; justify-content: space-between; align-items: flex-end;
            background-color: #1c1c1e; z-index: 20;
        }
        .header h1 { margin: 0; font-size: 20px; font-weight: 600; }
	.brand-logo {
  	  height: 28px; /* 根據你的需求調整 Logo 高度 */
   	 object-fit: contain;
	}
        .conn-status { font-size: 11px; color: #34c759; display: flex; align-items: center; gap: 5px; }
        .conn-status::before { content: ""; display: inline-block; width: 6px; height: 6px; background: #34c759; border-radius: 50%; }

        /* ====== 雙分頁系統 ====== */
        .tab-content { flex: 1; overflow-y: auto; display: none; flex-direction: column; background: #000; }
        .tab-content.active { display: flex; }
        
        .bottom-nav {
            display: flex; background: #1c1c1e; border-top: 1px solid #38383a;
            padding-bottom: 15px; padding-top: 10px; z-index: 20;
        }
        .nav-item { flex: 1; text-align: center; color: #8e8e93; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: #0a84ff; }
        .nav-icon { font-size: 18px; }

        /* ====== 視覺舞台 ====== */
        .visual-stage {
            height: 330px; position: relative; background: #1c1c1e;
            border-bottom: 1px solid #38383a; display: flex; justify-content: center; align-items: center; flex-shrink: 0; z-index: 10; overflow: hidden;
        }
        
        .hint-text { position: absolute; top: 12px; left: 20px; font-size: 11px; color: #8e8e93; pointer-events: none; }
        .hint-text span { color: #0a84ff; font-weight: bold; }

        /* ====== 修改：全息 HUD 九宮格地圖 (移至右上角) ====== */
        .holo-matrix {
            position: absolute; top: 15px; right: 15px; width: 65px; height: 65px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 6px;
            background: rgba(28, 28, 30, 0.75); border: 1px solid #38383a; border-radius: 12px;
            /* 保留 3D 透視感，做成抬頭顯示器的微傾斜質感 */
            transform-style: preserve-3d;
            transform: perspective(300px) rotateX(15deg) rotateY(-15deg);
            opacity: 0; transition: opacity 0.4s; z-index: 15; pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(10,132,255,0.1);
            backdrop-filter: blur(5px);
        }
        .holo-cell {
            background: rgba(10, 132, 255, 0.1); border: 1px solid rgba(10, 132, 255, 0.3);
            border-radius: 3px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .holo-cell.alert { background: rgba(255, 69, 58, 0.6); box-shadow: 0 0 10px rgba(255, 69, 58, 0.8); border-color: #ff453a; transform: translateZ(5px); }
        .holo-cell.active { background: rgba(10, 132, 255, 0.8); box-shadow: 0 0 10px rgba(10, 132, 255, 0.8); border-color: #0a84ff; transform: translateZ(10px); }

        /* 椅子結構 */
        .chair-group { position: absolute; bottom: 85px; left: 130px; transition: transform 0.3s ease; }
        .chair-back-wrapper { position: absolute; bottom: 0; left: -12px; width: 30px; height: 170px; transform-origin: bottom center; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 2; }
        
        .chair-headrest { position: absolute; bottom: 145px; left: -3px; width: 35px; height: 25px; background-color: #e0d5c1; border-radius: 12px; border: 3px solid #f4f4f5; z-index: 1; transition: transform 0.3s ease; }
        .chair-lumbar { position: absolute; bottom: 15px; left: 2px; width: 26px; height: 45px; background-color: #d1c5b1; border-radius: 8px; z-index: 3; transition: transform 0.3s ease; transform-origin: left center; }
        .chair-back { position: absolute; bottom: 0; left: 0; width: 30px; height: 140px; background-color: #e0d5c1; border-radius: 12px; border: 4px solid #f4f4f5; border-right: none; overflow: hidden; box-shadow: inset -5px 0 10px rgba(0,0,0,0.05); }
        .chair-armrest { position: absolute; bottom: 50px; left: 20px; width: 40px; height: 8px; background-color: #d1d1d6; border-radius: 4px; z-index: 4; }
        .chair-armrest-support { position: absolute; bottom: 20px; left: 25px; width: 8px; height: 35px; background-color: #f4f4f5; z-index: 3; }
        .chair-seat { position: absolute; bottom: 0; left: 0; width: 125px; height: 25px; background: linear-gradient(to bottom, #e0d5c1 60%, #f4f4f5 60%); border-radius: 12px; z-index: 2; transition: 0.3s; }
        .chair-leg-main { position: absolute; top: 25px; left: 55px; width: 14px; height: 50px; background: linear-gradient(to right, #aeaeb2, #d1d1d6); transition: height 0.3s ease; z-index: 1; }
        .chair-base { position: absolute; top: 75px; left: 20px; width: 85px; height: 12px; background-color: #8e8e93; border-radius: 6px; clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%); z-index: 2; transition: top 0.3s ease; }
        .chair-wheel { position: absolute; top: 85px; left: 25px; width: 12px; height: 12px; background-color: #38383a; border-radius: 50%; z-index: 1; transition: top 0.3s ease; box-shadow: 50px 0 0 #38383a; }

        /* 側邊氣囊視覺 (高低起伏) */
        .smart-zones { position: absolute; bottom: 25px; left: 10px; width: 105px; height: 20px; display: flex; gap: 3px; opacity: 0; z-index: 3; transition: opacity 0.3s; align-items: flex-end; }
        .zone-bubble { flex: 1; background: linear-gradient(to top, rgba(10,132,255,0.9), rgba(10,132,255,0.4)); border-radius: 4px 4px 0 0; transform-origin: bottom; transform: scaleY(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 實體面板 3D 化 */
        .physical-panel { 
            position: absolute; bottom: -5px; left: 35px; width: 80px; height: 24px; 
            background: linear-gradient(145deg, #2c2c2e, #18181a); border-radius: 6px; z-index: 6; 
            display: flex; justify-content: space-evenly; align-items: center; padding: 0 4px;
            transform-style: preserve-3d; transform: perspective(300px) rotateX(15deg) rotateY(-10deg) rotateZ(3deg);
            box-shadow: -2px 4px 5px rgba(0,0,0,0.6), inset 1px 1px 1px rgba(255,255,255,0.1); border: 1px solid #48484a;
        }
        .panel-btn { width: 10px; height: 10px; border-radius: 50%; cursor: pointer; transition: 0.2s; background: linear-gradient(145deg, #48484a, #2c2c2e); box-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .panel-btn.active-blue { background: #0a84ff; box-shadow: 0 0 10px #0a84ff, 1px 1px 2px rgba(0,0,0,0.5); }

        .heatmap { position: absolute; background: radial-gradient(circle, rgba(255,69,58,0.7) 0%, rgba(255,159,10,0.4) 50%, transparent 100%); opacity: 0; transition: 0.5s; z-index: 4; pointer-events: none; }
        .heat-seat { bottom: 25px; right: 10px; width: 60px; height: 40px; }

        /* 人物 */
        .person-group { position: absolute; bottom: 25px; left: 20px; transition: transform 0.4s ease; transform-origin: bottom center; z-index: 4; pointer-events: none; }
        .upper-body { width: 35px; height: 130px; position: absolute; bottom: 0; left: 0; transform-origin: bottom center; transition: transform 0.3s ease; }
        .person-torso { width: 35px; height: 85px; background-color: #a2b9ce; border-radius: 15px; position: absolute; bottom: 0; left: 0; }
        .person-head { width: 35px; height: 35px; background-color: #f7d5c4; border-radius: 50%; position: absolute; bottom: 95px; left: 0; }
        .person-leg { width: 65px; height: 20px; background-color: #8da4b9; border-radius: 10px; position: absolute; bottom: -5px; left: 10px; }

        /* ====== UI 區塊設計 ====== */
        .controls-scroll { padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; }
        .control-group { background: #1c1c1e; border-radius: 16px; padding: 16px; border: 1px solid #2c2c2e; }
        
        .mode-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 5px; }
        .mode-btn { background: #2c2c2e; border: 1px solid #38383a; color: #e5e5ea; padding: 10px 0; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: #0a84ff; color: #fff; border-color: #0a84ff; box-shadow: 0 4px 10px rgba(10, 132, 255, 0.3); }

        .control-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .control-title { font-size: 14px; font-weight: 600; color: #fff; }
        .control-val-display { font-size: 13px; color: #0a84ff; font-weight: 600; font-variant-numeric: tabular-nums; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 8px 0 15px; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #38383a; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { height: 20px; width: 20px; border-radius: 50%; background: #ffffff; cursor: pointer; -webkit-appearance: none; margin-top: -7px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .temp-track::-webkit-slider-runnable-track { background: linear-gradient(90deg, #0a84ff, #38383a, #ff453a) !important; }

        .system-alert-box { background: rgba(10, 132, 255, 0.1); border: 1px solid rgba(10, 132, 255, 0.3); border-radius: 12px; padding: 12px; font-size: 13px; color: #0a84ff; text-align: center; font-weight: 500; transition: 0.3s; margin-top: 5px; }
        .system-alert-box.alert { background: rgba(255, 69, 58, 0.1); border-color: rgba(255, 69, 58, 0.3); color: #ff453a; }

        /* ====== 數據面板 ====== */
        .data-dashboard { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .score-card { background: linear-gradient(135deg, #2c2c2e, #1c1c1e); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #38383a; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; border: 8px solid #34c759; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: 700; color: #34c759; text-shadow: 0 0 15px rgba(52, 199, 89, 0.4); transition: 0.3s; }
        .score-title { font-size: 16px; color: #e5e5ea; font-weight: 600; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: #1c1c1e; padding: 15px; border-radius: 16px; text-align: left; border: 1px solid #2c2c2e; }
        .stat-label { font-size: 12px; color: #8e8e93; margin-bottom: 5px; }
        .stat-val { font-size: 20px; font-weight: 600; color: #fff; }
        .stat-val span { font-size: 12px; color: #8e8e93; }

    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="ALIGN" class="brand-logo">
    <div class="conn-status">已連線同步</div>
</div>

    <div class="visual-stage" onclick="triggerAnomalySync()">
        <div class="hint-text">點擊畫面模擬 <span>氣囊補償</span></div>
        
        <div class="holo-matrix" id="holoMatrix">
            <div class="holo-cell" id="hc1"></div><div class="holo-cell" id="hc2"></div><div class="holo-cell" id="hc3"></div>
            <div class="holo-cell" id="hc4"></div><div class="holo-cell" id="hc5"></div><div class="holo-cell" id="hc6"></div>
            <div class="holo-cell" id="hc7"></div><div class="holo-cell" id="hc8"></div><div class="holo-cell" id="hc9"></div>
        </div>

        <div class="chair-group" id="chairGroup">
            <div class="chair-back-wrapper" id="chairBackWrapper">
                <div class="chair-headrest" id="chairHeadrest"></div>
                <div class="chair-lumbar" id="chairLumbar"></div>
                <div class="chair-back" id="chairBack"></div>
            </div>
            
            <div class="chair-armrest-support"></div>
            <div class="chair-armrest"></div>
            
            <div class="chair-seat" id="chairSeat">
                <div class="smart-zones" id="smartZones">
                    <div class="zone-bubble" id="zb1"></div>
                    <div class="zone-bubble" id="zb2"></div>
                    <div class="zone-bubble" id="zb3"></div>
                    <div class="zone-bubble" id="zb4"></div>
                    <div class="zone-bubble" id="zb5"></div>
                </div>
                <div class="heatmap heat-seat" id="heatSeat"></div>
                
                <div class="physical-panel">
                    <div class="panel-btn" id="phyBtnPosture"></div>
                    <div class="panel-btn"></div>
                    <div class="panel-btn"></div>
                </div>

                <div class="person-group" id="personGroup">
                    <div class="upper-body" id="upperBody">
                        <div class="person-torso"></div>
                        <div class="person-head"></div>
                    </div>
                    <div class="person-leg"></div>
                </div>
            </div>
            
            <div class="chair-leg-main" id="chairLeg"></div>
            <div class="chair-base" id="chairBase"></div>
            <div class="chair-wheel" id="chairWheel"></div>
        </div>
    </div>

    <div id="tab-control" class="tab-content active">
        <div class="controls-scroll">
            
            <div class="system-alert-box" id="sysAlert">
                系統平衡待機中 | 自動感測體態
            </div>

            <div class="control-group" style="padding-bottom: 10px;">
                <div class="control-header" style="margin-bottom: 8px;">
                    <span class="control-title">智慧情境模式</span>
                </div>
                <div class="mode-grid">
                    <button class="mode-btn" id="mode-read" onclick="setMode('read')">閱讀</button>
                    <button class="mode-btn active" id="mode-work" onclick="setMode('work')">工作</button>
                    <button class="mode-btn" id="mode-relax" onclick="setMode('relax')">放鬆</button>
                    <button class="mode-btn" id="mode-custom" onclick="setMode('custom')">自訂</button>
                </div>
            </div>

            <div class="control-group">
                <div class="control-header">
                    <span class="control-title">座椅高度調整</span>
                    <span class="control-val-display" id="heightVal">45 cm</span>
                </div>
                <input type="range" min="40" max="55" value="45" id="heightSlider" oninput="updateControls(true)">

                <div class="control-header">
                    <span class="control-title">椅背傾仰角度</span>
                    <span class="control-val-display" id="angleVal">95°</span>
                </div>
                <input type="range" min="90" max="135" value="95" id="angleSlider" oninput="updateControls(true)">

                <div class="control-header">
                    <span class="control-title">動態腰靠深度</span>
                    <span class="control-val-display" id="lumbarVal">40%</span>
                </div>
                <input type="range" min="0" max="100" value="40" id="lumbarSlider" oninput="updateControls(true)">

                <div class="control-header" style="margin-bottom: 0;">
                    <span class="control-title">頸枕高度調節</span>
                    <span class="control-val-display" id="headVal">0 cm</span>
                </div>
                <input type="range" min="-10" max="10" value="0" id="headSlider" oninput="updateControls(true)" style="margin-bottom: 0;">
            </div>

            <div class="control-group">
                <div class="control-header">
                    <span class="control-title">坐墊溫度設定</span>
                    <span class="control-val-display" id="tempVal" style="color: #ffffff;">25°C (自然)</span>
                </div>
                <input type="range" min="18" max="38" value="25" class="temp-track" id="tempSlider" oninput="updateTemp(this.value)" style="margin-bottom: 0;">
            </div>

        </div>
    </div>

    <div id="tab-data" class="tab-content">
        <div class="data-dashboard">
            <div class="score-card">
                <div class="score-title" style="margin-bottom: 15px;">綜合健康體態評分</div>
                <div class="score-circle" id="scoreCircle">92</div>
                <div style="font-size: 13px; color: #8e8e93;">擊敗了 88% 的使用者</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">今日累積入座</div>
                    <div class="stat-val">4 <span>h</span> 15 <span>m</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">局部氣囊介入</div>
                    <div class="stat-val" style="color: #0a84ff;">3 <span>次</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">最常偏移方向</div>
                    <div class="stat-val" style="color: #ff9f0a;">右後傾</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">預估消耗熱量</div>
                    <div class="stat-val">128 <span>kcal</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-control" onclick="switchTab('control')">
            <span class="nav-icon">🎛️</span>
            <span>精細控制</span>
        </div>
        <div class="nav-item" id="nav-data" onclick="switchTab('data')">
            <span class="nav-icon">📊</span>
            <span>健康數據</span>
        </div>
    </div>
</div>

<script>
    // 音效引擎
    const SoundEngine = {
        ctx: null,
        init: function() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
        playTone: function(freq, type, duration, vol) { if (!this.ctx) return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration); },
        tick: function() { this.init(); this.playTone(800, 'sine', 0.05, 0.02); }, 
        click: function() { this.init(); this.playTone(1200, 'sine', 0.1, 0.05); }, 
        alert: function() { this.init(); this.playTone(400, 'sawtooth', 0.2, 0.05); setTimeout(()=>this.playTone(400, 'sawtooth', 0.2, 0.05), 300); },
        success: function() { this.init(); this.playTone(523.25, 'sine', 0.4, 0.05); this.playTone(659.25, 'sine', 0.4, 0.05); this.playTone(783.99, 'sine', 0.6, 0.05); }
    };
    document.body.addEventListener('click', () => { SoundEngine.init(); }, { once: true });

    // DOM 元素
    const angleSlider = document.getElementById('angleSlider');
    const lumbarSlider = document.getElementById('lumbarSlider');
    const headSlider = document.getElementById('headSlider');
    const heightSlider = document.getElementById('heightSlider');
    const tempSlider = document.getElementById('tempSlider');
    
    const chairGroup = document.getElementById('chairGroup');
    const chairBackWrapper = document.getElementById('chairBackWrapper');
    const upperBody = document.getElementById('upperBody');
    const chairLumbar = document.getElementById('chairLumbar');
    const chairHeadrest = document.getElementById('chairHeadrest');
    const chairLeg = document.getElementById('chairLeg');
    const chairBase = document.getElementById('chairBase');
    const chairWheel = document.getElementById('chairWheel');
    
    const smartZones = document.getElementById('smartZones');
    const holoMatrix = document.getElementById('holoMatrix'); // HUD 地圖
    const phyBtnPosture = document.getElementById('phyBtnPosture');
    const personGroup = document.getElementById('personGroup');
    const heatSeat = document.getElementById('heatSeat');
    const sysAlert = document.getElementById('sysAlert');
    let isSimulating = false;

    // 分頁切換
    function switchTab(tab) {
        SoundEngine.click();
        document.getElementById('tab-control').classList.remove('active');
        document.getElementById('tab-data').classList.remove('active');
        document.getElementById('nav-control').classList.remove('active');
        document.getElementById('nav-data').classList.remove('active');
        
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('nav-' + tab).classList.add('active');
    }

    // 更新控制 (手動)
    function updateControls(isManual = false) {
        if(isManual) SoundEngine.tick();

        // 高度
        let height = heightSlider.value;
        document.getElementById('heightVal').innerText = height + ' cm';
        let offset = (height - 45) * -2; 
        chairGroup.style.transform = `translateY(${offset}px)`;
        chairLeg.style.height = `${50 - offset}px`;
        chairBase.style.top = `${75 - offset}px`;
        chairWheel.style.top = `${85 - offset}px`;

        // 角度
        let angle = angleSlider.value;
        document.getElementById('angleVal').innerText = angle + '°';
        let visualAngle = angle - 90;
        chairBackWrapper.style.transform = `rotate(-${visualAngle}deg)`;
        upperBody.style.transform = `rotate(-${visualAngle}deg)`;

        // 腰靠
        let lumbar = lumbarSlider.value;
        document.getElementById('lumbarVal').innerText = lumbar + '%';
        let scale = 1 + (lumbar / 100) * 0.8;
        chairLumbar.style.transform = `scaleX(${scale})`;

        // 頭枕
        let head = headSlider.value;
        document.getElementById('headVal').innerText = head + ' cm';
        chairHeadrest.style.transform = `translateY(${head * -1}px)`;
        
        if (isManual) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-custom').classList.add('active');
        }
    }

    // 溫度
    function updateTemp(val) {
        SoundEngine.tick();
        let display = document.getElementById('tempVal');
        if(val > 30) {
            display.innerText = val + '°C (啟動熱敷)'; display.style.color = '#ff453a';
            heatSeat.style.opacity = '1';
        } else {
            if(val < 22) {
                display.innerText = val + '°C (啟動散熱)'; display.style.color = '#0a84ff';
            } else {
                display.innerText = val + '°C (自然)'; display.style.color = '#ffffff';
            }
            if(!isSimulating) heatSeat.style.opacity = '0';
        }
    }

    // 情境模式
    const modes = {
        read:  { angle: 105, lumbar: 70, head: 5,  height: 42 },
        work:  { angle: 95,  lumbar: 40, head: 0,  height: 48 },
        relax: { angle: 130, lumbar: 20, head: 8,  height: 40 },
        custom:{ angle: 110, lumbar: 50, head: 0,  height: 45 }
    };

    function setMode(mode) {
        SoundEngine.click();
        
        angleSlider.value = modes[mode].angle;
        lumbarSlider.value = modes[mode].lumbar;
        headSlider.value = modes[mode].head;
        heightSlider.value = modes[mode].height;
        
        updateControls(false);

        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode-' + mode).classList.add('active');
    }

    // ====== HUD 全息九宮格氣囊模擬作動 ======
    function triggerAnomalySync() {
        if (isSimulating) return;
        isSimulating = true;
        SoundEngine.alert();

        // 1. 異常狀態
        phyBtnPosture.classList.add('active-blue');
        personGroup.style.transform = "rotate(12deg)"; 
        
        // 浮現 HUD 地圖在右上角
        holoMatrix.style.opacity = '1';
        
        // 模擬右後側壓力過大 (紅燈)
        document.getElementById('hc8').classList.add('alert');
        document.getElementById('hc9').classList.add('alert');
        
        sysAlert.innerText = "⚠ 警告：偵測到右後側骨盆異常重壓";
        sysAlert.classList.add('alert');
        document.getElementById('scoreCircle').innerText = "78";
        document.getElementById('scoreCircle').style.color = "#ff453a";

        // 2. 系統作動：氣囊補償
        setTimeout(() => {
            sysAlert.innerText = "作動中：AI 局部氣囊動態補償中";
            sysAlert.classList.remove('alert');
            
            // HUD 紅燈變藍燈，且 3D 凸出
            document.getElementById('hc8').classList.remove('alert');
            document.getElementById('hc9').classList.remove('alert');
            document.getElementById('hc8').classList.add('active');
            document.getElementById('hc9').classList.add('active');
            
            // 同步椅子上的視覺氣囊升起
            smartZones.style.opacity = "1";
            setTimeout(() => document.getElementById('zb3').style.transform = "scaleY(1.3)", 50);
            setTimeout(() => document.getElementById('zb4').style.transform = "scaleY(1.6)", 150);
            setTimeout(() => document.getElementById('zb5').style.transform = "scaleY(1.2)", 250);

            // 3. 骨盆回正
            setTimeout(() => {
                SoundEngine.success();
                personGroup.style.transform = "rotate(0deg)";
                sysAlert.innerText = "系統平衡待機中 | 自動感測體態";
                document.getElementById('scoreCircle').innerText = "92";
                document.getElementById('scoreCircle').style.color = "#34c759";
                
                // 結束作動，收起地圖與氣囊
                setTimeout(() => {
                    holoMatrix.style.opacity = '0'; // 隱藏 HUD
                    document.getElementById('hc8').classList.remove('active');
                    document.getElementById('hc9').classList.remove('active');
                    
                    smartZones.style.opacity = "0";
                    for(let i=1; i<=5; i++) {
                        document.getElementById('zb'+i).style.transform = "scaleY(0)";
                    }
                    phyBtnPosture.classList.remove('active-blue');
                    isSimulating = false;
                }, 1200);
            }, 1800);
        }, 1500);
    }

    // 初始化狀態
    updateControls(false);
</script>

</body>
</html>
